<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peluquería Elite PRO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="banner" id="mainBanner">
        <div id="bannerBg" class="banner-bg"></div>
        <h1 id="txtBannerDisplay">BARBERIA 41545</h1>
        <div class="banner-controls">
            <button type="button" onclick="window.copiarResumen()">📋</button>
            <button type="button" onclick="window.irAHoy()">📅</button>
            <button type="button" onclick="window.abrirConfig()">⚙️</button>
        </div>
    </header>

    <nav class="header-nav">
        <button id="prevMonth" class="btn-nav"><span>&#10094;</span></button>
        <h2 id="monthYear">MES AÑO</h2>
        <button id="nextMonth" class="btn-nav"><span>&#10095;</span></button>
    </nav>

    <div class="weekdays-grid">
        <div>LU</div><div>MA</div><div>MI</div><div>JU</div><div>VI</div><div>SA</div><div>DO</div>
    </div>

    <main id="calendar-container">
        <div id="calendar"></div>
    </main>

    <footer id="footer-summary">
        <div class="stat-box">
            <span class="stat-label">Ingresos</span>
            <span id="totalIngresos" class="stat-value" style="color: #B2F2BB;">$ 0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Gastos</span>
            <span id="totalGastos" class="stat-value" style="color: #F2B8B5;">$ 0</span>
        </div>
        <div class="stat-box destacado">
            <span class="stat-label">Balance</span>
            <span id="totalNeto" class="stat-value">$ 0</span>
        </div>
    </footer>

    <div id="modalDia" class="modal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <h2 id="fechaDiaTitulo">--/--/----</h2>
            <div class="btn-nuevo-dia" onclick="window.abrirFormularioNuevo()">+ Agregar Registro</div>
            <div id="listaTurnosDia" class="lista-dia-scroll"></div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="window.cerrarModalDia()">CERRAR</button>
            </div>
        </div>
    </div>

    <div id="modalTurno" class="modal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <h2 id="modalTitle">Nuevo Registro</h2>
            <div class="input-group">
                <input type="text" id="nombreCliente" placeholder="Nombre o Concepto">
            </div>
            <div class="input-row" style="display:flex; gap:10px;">
                <input type="time" id="horaTurno" style="flex:1;">
                <input type="number" id="montoTurno" placeholder="Monto $" style="flex:1;">
            </div>
            <div class="input-group">
                <select id="tipoRegistro">
                    <option value="ingreso">✂️ Turno (Ingreso)</option>
                    <option value="gasto">💸 Gasto (Egreso)</option>
                </select>
            </div>
            <div class="modal-btns">
                <button class="btn-confirm" id="btnGuardar">GUARDAR CAMBIOS</button>
                <button class="btn-delete" id="btnBorrar" style="display:none;">ELIMINAR</button>
                <button class="btn-cancel" onclick="window.cerrarModal()">DESCARTAR</button>
            </div>
        </div>
    </div>

    <div id="modalConfig" class="modal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <h2>Ajustes</h2>
            <input type="text" id="configNombre" placeholder="Nombre Barbería">
            <input type="file" id="configFoto" accept="image/*">
            <div class="modal-btns">
                <button class="btn-confirm" onclick="window.guardarConfig()">GUARDAR</button>
                <button class="btn-cancel" onclick="window.cerrarConfig()">VOLVER</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peluquería Elite PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1C1B1F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2793/2793765.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2793/2793765.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="banner" id="mainBanner">
        <div id="bannerBg" class="banner-bg"></div>
        <h1 id="txtBannerDisplay">BARBERIA 41545</h1>
        <div class="banner-controls">
            <button type="button" onclick="window.copiarResumen()" title="Copiar Resumen">📋</button>
            <button type="button" onclick="window.irAHoy()" title="Ir a hoy">📅</button>
            <button type="button" onclick="window.abrirConfig()" title="Configuración">⚙️</button>
        </div>
    </header>

    <nav class="header-nav">
        <button id="prevMonth" class="btn-nav"><span>&#10094;</span></button>
        <h2 id="monthYear">MES AÑO</h2>
        <button id="nextMonth" class="btn-nav"><span>&#10095;</span></button>
    </nav>

    <div class="weekdays-grid">
        <div>LU</div><div>MA</div><div>MI</div><div>JU</div><div>VI</div><div>SA</div><div>DO</div>
    </div>

    <main id="calendar-container">
        <div id="calendar"></div>
    </main>

    <footer id="footer-summary">
        <div class="stat-box">
            <span class="stat-label">Ingresos</span>
            <span id="totalIngresos" class="stat-value" style="color: var(--md-ingreso);">$ 0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Gastos</span>
            <span id="totalGastos" class="stat-value" style="color: var(--md-sys-color-error);">$ 0</span>
        </div>
        <div class="stat-box destacado">
            <span class="stat-label">Balance</span>
            <span id="totalNeto" class="stat-value">$ 0</span>
        </div>
    </footer>

    <script src="script.js"></script>
    
    <script>
        // --- CONEXIÓN DIRECTA CON EL BOT ---
        const SUPABASE_URL = 'https://neyvklveqledlurvpcmr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5leXZrbHZlcWxlZGx1cnZwY21yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzQ3NjYsImV4cCI6MjA4OTExMDc2Nn0.JVlEPagEGj-Tz7jY5OvrozXvjXA41CPkb0wxgJVrWRE';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function sincronizarConBot() {
            try {
                const { data, error } = await supabaseClient
                    .from('turnos')
                    .select('*')
                    .eq('barberia_id', 'barberia_41545');

                if (error) throw error;

                console.log("Datos recibidos del bot:", data);
                
                // Si tu script.js tiene una función para redibujar el calendario, 
                // aquí deberíamos llamarla pasando los 'data'.
                if(typeof window.actualizarInterfaz === 'function'){
                    window.actualizarInterfaz(data);
                }

            } catch (err) {
                console.error("Error de sincronización:", err);
            }
        }

        // Ejecutar sincronización cada 10 segundos
        setInterval(sincronizarConBot, 10000);
        sincronizarConBot();
    </script>
</body>
</html>

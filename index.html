<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peluquería Elite PRO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="banner">
        <div class="banner-bg"></div>
        <h1 id="txtBannerDisplay">BARBERIA 4154</h1>
        <div class="banner-controls">
            <button onclick="window.irAHoy()">📅 Hoy</button>
        </div>
    </header>

    <nav class="header-nav">
        <button id="prevMonth" class="btn-nav"> < </button>
        <h2 id="monthYear">MES AÑO</h2>
        <button id="nextMonth" class="btn-nav"> > </button>
    </nav>

    <div class="weekdays-grid">
        <div>LU</div><div>MA</div><div>MI</div><div>JU</div><div>VI</div><div>SA</div><div>DO</div>
    </div>

    <div id="calendar"></div>

    <footer id="footer-summary">
        <div class="stat-box">
            <span class="stat-label">Ingresos</span>
            <span id="totalIngresos" class="stat-value" style="color:#B2F2BB">$ 0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Gastos</span>
            <span id="totalGastos" class="stat-value" style="color:#F2B8B5">$ 0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Neto</span>
            <span id="totalNeto" class="stat-value" style="color:white">$ 0</span>
        </div>
    </footer>

    <div id="modalDia" class="modal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <h2 id="fechaDiaTitulo"></h2>
            <button class="btn-confirm" style="width:100%; margin-bottom:15px;" onclick="window.abrirFormularioNuevo()">+ NUEVO REGISTRO</button>
            <div id="listaTurnosDia"></div>
            <button class="btn-cancel" style="width:100%" onclick="window.cerrarModalDia()">CERRAR</button>
        </div>
    </div>

    <div id="modalTurno" class="modal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <h2 id="modalTitle">Nuevo Registro</h2>
            <input type="text" id="nombreCliente" placeholder="Nombre">
            <input type="time" id="horaTurno">
            <input type="number" id="montoTurno" placeholder="Monto $">
            <select id="tipoRegistro">
                <option value="ingreso">✂️ Turno</option>
                <option value="gasto">💸 Gasto</option>
            </select>
            <div class="modal-btns">
                <button class="btn-confirm" id="btnGuardar">GUARDAR</button>
                <button class="btn-delete" id="btnBorrar">ELIMINAR</button>
                <button class="btn-cancel" onclick="window.cerrarModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

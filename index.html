<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Peluquería Elite PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2793/2793765.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2793/2793765.png">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="banner" id="mainBanner">
        <div id="bannerBg" class="banner-bg"></div>
        <div class="banner-overlay"></div>
        
        <h1 id="txtBannerDisplay">PELUQUERÍA ELITE</h1>
        
        <div class="banner-controls">
            <button onclick="copiarResumen()" title="Copiar Resumen">📋</button>
            <button onclick="irAHoy()" title="Ir a hoy">📅</button>
            <button onclick="abrirConfig()" title="Configuración">⚙️</button>
        </div>
    </header>

    <nav class="header-nav">
        <button id="prevMonth">◀</button>
        <h2 id="monthYear">MES AÑO</h2>
        <button id="nextMonth">▶</button>
    </nav>

    <div class="weekdays-grid">
        <div>LU</div><div>MA</div><div>MI</div><div>JU</div><div>VI</div><div>SA</div><div>DO</div>
    </div>

    <main id="calendar-container">
        <div id="calendar"></div>
    </main>

    <footer id="footer-summary">
        <div class="stat-box">
            <span class="stat-label">Ingresos (<span id="countIngresos">0</span>)</span>
            <span id="totalIngresos" class="stat-value success">$ 0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Gastos (<span id="countGastos">0</span>)</span>
            <span id="totalGastos" class="stat-value danger-text">$ 0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Balance Neto</span>
            <span id="totalNeto" class="stat-value info">$ 0</span>
        </div>
    </footer>

    <div id="modalTurno" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Nuevo Registro</h2>
            
            <div class="input-group">
                <label id="lblNombre">Nombre del Cliente</label>
                <input type="text" id="nombreCliente" placeholder="Ej: Gabriel">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>Hora</label>
                    <input type="time" id="horaTurno">
                </div>
                <div class="input-group">
                    <label>Monto $</label>
                    <input type="number" id="montoTurno" placeholder="0">
                </div>
            </div>

            <div class="input-group">
                <label>Categoría</label>
                <select id="tipoRegistro" onchange="adaptarModal()">
                    <option value="ingreso">Turno (Ingreso) ✂️</option>
                    <option value="gasto">Gasto (Egreso) 💸</option>
                </select>
            </div>

            <div class="modal-btns">
                <button class="btn-confirm" id="btnGuardar">Guardar Turno</button>
                <button class="btn-delete" id="btnBorrar" style="display:none;">Eliminar Registro</button>
                <button class="btn-cancel" onclick="cerrarModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="modalConfig" class="modal">
        <div class="modal-content">
            <h2>Personalización</h2>
            
            <div class="input-group">
                <label>Nombre del Negocio</label>
                <input type="text" id="configNombre">
            </div>

            <div class="input-group">
                <label>Imagen de Banner (Opcional)</label>
                <input type="file" id="configFoto" accept="image/*" style="padding: 8px;">
                <p style="font-size: 10px; color: var(--text-muted); margin-top: 5px;">Se recomienda una imagen alargada.</p>
            </div>

            <div class="modal-btns">
                <button class="btn-confirm" onclick="guardarConfig()">Aplicar y Guardar</button>
                <button class="btn-cancel" onclick="cerrarConfig()">Volver</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
